apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: roboshop
  region: us-east-1

autoModeConfig:
  enabled: false

managedNodeGroups:
  - name: on-demand
    instanceType: t3.medium
    desiredCapacity: 2
    capacityType: ON_DEMAND
    volumeSize: 20

    iam:
      withAddonPolicies:
        autoScaler: true
        externalDNS: true
        certManager: true