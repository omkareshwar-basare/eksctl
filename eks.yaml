apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: roboshop
  region: us-east-1

autoModeConfig:
  enabled: false

managedNodeGroups:
  - name: on-demand
    instanceType: t3.small
    desiredCapacity: 2
    minSize: 1
    maxSize: 3
    volumeSize: 20

    spot: false
    privateNetworking: true

    iam:
      withAddonPolicies:
        autoScaler: true
        externalDNS: true
        certManager: true